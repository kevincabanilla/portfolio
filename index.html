<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>%VITE_APP_TITLE%</title>

    <!-- SEO -->
    <link rel="canonical" href="%VITE_APP_BASE_URL%" />
    <meta name="description" content="%VITE_APP_DESCRIPTION%" />
    <meta name="keywords" content="%VITE_APP_KEYWORDS%" />
    <meta name="author" content="%VITE_APP_AUTHOR%" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (Facebook, LinkedIn, Discord, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="%VITE_APP_TITLE%" />
    <meta property="og:description" content="%VITE_APP_OG_DESCRIPTION%." />
    <meta property="og:url" content="%VITE_APP_BASE_URL%" />
    <meta property="og:image" content="%VITE_APP_OG_IMAGE%" />
    <meta property="og:site_name" content="%VITE_APP_OG_SITE_NAME%" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="%VITE_APP_TITLE%" />
    <meta name="twitter:description" content="%VITE_APP_OG_DESCRIPTION%" />
    <meta name="twitter:image" content="%VITE_APP_OG_IMAGE%" />

    <!-- Theme -->
    <meta name="theme-color" content="%VITE_APP_THEME_COLOR%" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "%VITE_APP_AUTHOR%",
        "url": "%VITE_APP_BASE_URL%",
        "jobTitle": "%VITE_APP_TITLE%",
        "sameAs": ["%VITE_APP_URL_GITHUB%", "%VITE_APP_URL_LINKEDIN%"]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
